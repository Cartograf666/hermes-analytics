
    <!DOCTYPE html>
    <html lang="ru">
    <head>
        <meta charset="UTF-8">
        <title>Hermes Performance OS [TUI Edition]</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
        <style>
            body { 
                background-color: #0a0c10; 
                color: #c9d1d9; 
                font-family: 'JetBrains Mono', monospace;
                letter-spacing: -0.02em;
            }
            .tui-panel { 
                background-color: #161b22; 
                border: 1px solid #30363d; 
                border-radius: 4px;
                position: relative;
                box-shadow: 0 0 0 1px #30363d;
            }
            .tui-header { 
                background-color: #21262d; 
                color: #58a6ff; 
                font-weight: bold;
                padding: 4px 12px;
                border-bottom: 1px solid #30363d;
                font-size: 0.85rem;
                text-transform: uppercase;
            }
            .tui-value { 
                color: #79c0ff; 
                font-weight: bold;
            }
            .tui-label { 
                color: #8b949e; 
                font-size: 0.8rem;
            }
        </style>
    </head>
    <body class="p-6">
        <div class="max-w-6xl mx-auto">
            <header class="flex justify-between items-end mb-6 border-b border-slate-700 pb-4">
                <div>
                    <h1 class="text-3xl font-bold text-blue-500">HERMES_PERFORMANCE_OS <span class="text-slate-600 text-xl">v2.0-TUI</span></h1>
                    <p class="text-slate-500 text-sm">System monitoring for AI Agent core. All read-only. No auth.</p>
                </div>
                <div class="text-right font-mono text-xs text-slate-500">
                    <div>UPTIME: 100%</div>
                    <div>LAST_SYNC: 2026-04-19 15:06:15</div>
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <div class="tui-panel">
                    <div class="tui-header">TOTAL_TOKENS</div>
                    <div class="p-4 text-center">
                        <p class="text-3xl font-bold tui-value">0</p>
                    </div>
                </div>
                <div class="tui-panel">
                    <div class="tui-header">EFFICIENCY</div>
                    <div class="p-4 text-center">
                        <p class="text-3xl font-bold text-green-400">92%</p>
                    </div>
                </div>
                <div class="tui-panel">
                    <div class="tui-header">SKILL_BASE</div>
                    <div class="p-4 text-center">
                        <p class="text-3xl font-bold text-purple-400">30</p>
                    </div>
                </div>
                <div class="tui-panel">
                    <div class="tui-header">TASK_COUNT</div>
                    <div class="p-4 text-center">
                        <p class="text-3xl font-bold text-orange-400">2805</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="tui-panel">
                    <div class="tui-header">TOKEN_USAGE_TIMELINE</div>
                    <div class="p-4">
                        <canvas id="tokenChart" height="200"></canvas>
                    </div>
                </div>
                <div class="tui-panel">
                    <div class="tui-header">TOOL_DISTRIBUTION</div>
                    <div class="p-4 flex justify-center">
                        <div style="width: 250px;"><canvas id="toolsChart"></canvas></div>
                    </div>
                </div>
            </div>

            <footer class="mt-8 text-center text-xs text-slate-600 font-mono">
                [F1] Help | [F2] Refresh | [F3] Settings | [Q] Quit
            </footer>
        </div>

        <script>
            const ctxToken = document.getElementById('tokenChart').getContext('2d');
            new Chart(ctxToken, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{ 
                        label: 'Tokens', 
                        data: [], 
                        borderColor: '#58a6ff', 
                        backgroundColor: 'rgba(88, 166, 255, 0.1)',
                        borderWidth: 2,
                        pointRadius: 3,
                        pointBackgroundColor: '#58a6ff',
                        tension: 0.1, 
                        fill: true 
                    }]
                },
                options: { 
                    responsive: true,
                    scales: { 
                        y: { ticks: { color: '#8b949e', font: { family: 'JetBrains Mono' } }, grid: { color: '#30363d' } },
                        x: { ticks: { color: '#8b949e', font: { family: 'JetBrains Mono' } }, grid: { color: '#30363d' } }
                    },
                    plugins: { 
                        legend: { display: false } 
                    }
                }
            });

            const ctxTools = document.getElementById('toolsChart').getContext('2d');
            new Chart(ctxTools, {
                type: 'doughnut',
                data: {
                    labels: ["web_search", "terminal", "write_file", "execute_code", "skill_view", "read_file"],
                    datasets: [{ 
                        data: [4, 57, 11, 32, 12, 13], 
                        backgroundColor: ['#58a6ff', '#bc8cff', '#ff7b72', '#d29922', '#3fb950', '#8b949e'], 
                        borderWidth: 2,
                        borderColor: '#161b22'
                    }]
                },
                options: { 
                    responsive: true,
                    plugins: { 
                        legend: { 
                            position: 'bottom',
                            labels: { 
                                color: '#8b949e', 
                                font: { family: 'JetBrains Mono', size: 11 } 
                            } 
                        } 
                    }
                }
            });
        </script>
    </body>
    </html>
