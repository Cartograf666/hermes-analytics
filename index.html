
    <!DOCTYPE html>
    <html lang="ru">
    <head>
        <meta charset="UTF-8">
        <title>Hermes Analytics Dashboard</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <style>body { background-color: #0f172a; color: #f8fafc; } .card { background-color: #1e293b; border-radius: 1rem; padding: 1.5rem; }</style>
    </head>
    <body class="p-8">
        <div class="max-w-6xl mx-auto">
            <header class="flex justify-between items-center mb-8">
                <div><h1 class="text-4xl font-bold text-blue-400">Hermes Analytics</h1><p class="text-slate-400">Отслеживание эффективности ИИ-агента</p></div>
                <div class="text-right"><p class="text-sm text-slate-500">Обновлено:</p><p class="font-mono">2026-04-19 14:06:58</p></div>
            </header>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="card text-center"><p class="text-slate-400 text-sm mb-2">Статус</p><p class="text-2xl font-bold text-green-400">Active</p></div>
                <div class="card text-center"><p class="text-slate-400 text-sm mb-2">Эффективность</p><p class="text-2xl font-bold text-blue-400">85%</p></div>
                <div class="card text-center"><p class="text-slate-400 text-sm mb-2">Скиллов в базе</p><p class="text-2xl font-bold text-purple-400">107</p></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="card"><h2 class="text-xl font-semibold mb-4">Использование инструментов</h2><canvas id="toolsChart"></canvas></div>
                <div class="card"><h2 class="text-xl font-semibold mb-4">Задачи (в разработке)</h2><p class="text-slate-500">Динамика задач будет доступна после интеграции с логами сессий.</p></div>
            </div>
        </div>
        <script>
            new Chart(document.getElementById('toolsChart'), {
                type: 'doughnut',
                data: {
                    labels: ["web_search", "skill_view", "terminal"],
                    datasets: [{ data: [4, 12, 29], backgroundColor: ['#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981', '#64748b'], borderWidth: 0 }]
                },
                options: { plugins: { legend: { labels: { color: 'white' } } } }
            });
        </script>
    </body>
    </html>
